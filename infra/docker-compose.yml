services:
  rootstock-node:
    image: rsksmart/rskj:IRIS-3.3.0
    platform: linux/amd64
    ports:
      - "4444:4444"
      - "5050:5050"
    command: "--regtest"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/4444 && exec 3<&- && exec 3>&-'"
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 180s

  initializer:
    build: ./initializer
    environment:
      RSK_RPC_URL: ${RSK_RPC_URL:-http://rootstock-node:4444/}
      MANAGER_PRIVATE_KEY: ${MANAGER_PRIVATE_KEY}
      WORKER_PRIVATE_KEY: ${WORKER_PRIVATE_KEY}
      FAUCET_PRIVATE_KEY: ${FAUCET_PRIVATE_KEY:-}
      RSK_RPC_HOST_HEADER: ${RSK_RPC_HOST_HEADER:-}
    depends_on:
      rootstock-node:
        condition: service_healthy
